<head>
    <meta name = "viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <h2>Transfer Money</h2>
        <input type = "text" id="payer" placeholder="Enter Payer Address">
        <input type = "text" id="payee" placeholder="Enter Payee Address">
        <input type = "text" id="amount" placeholder="Enter Payer Address">
        <button class="btn" onclick="transfer()">Transfer</button>
        <form action="/main" method="post">
            <input type="submit" value=Main>
        </form>

        <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
        <script>
            const contractAddress = "0xadd5b5e5813793359c52540830a045b8f44be5fc";
            const contractABI = [
	{
		"inputs": [
			{
				"internalType": "address",
				"name": "_payer",
				"type": "address"
			},
			{
				"internalType": "address",
				"name": "_payee",
				"type": "address"
			},
			{
				"internalType": "uint256",
				"name": "_amount",
				"type": "uint256"
			}
		],
		"name": "weixin",
		"outputs": [],
		"stateMutability": "payable",
		"type": "function"
	},
	{
		"inputs": [],
		"name": "checkTransaction",
		"outputs": [
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			},
			{
				"internalType": "address",
				"name": "",
				"type": "address"
			},
			{
				"internalType": "uint256",
				"name": "",
				"type": "uint256"
			}
		],
		"stateMutability": "view",
		"type": "function"
	}
];
        const web3 = new Web3(Web3.givenProvider);
        const contract = new web3.eth.Contract(contractABI,contractAddress)


        async function transfer(){
            const accounts = await web3.eth.requestAccounts();
            const payer = document.getElementById("payer").value;
            const Payee = document.getElementById("payee").value;
            const amount = document.getElementById("amount").value;
            console.log(payer,payee,amount);

            await contract.method.weixin(payer,payee,amount).send({from:accounts[0]})

            }
        </script>
    </div>
</body>
